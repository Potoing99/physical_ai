<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>네이버 뉴스 스크래핑</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem;
        line-height: 1.5;
      }
      h1 {
        margin-bottom: 0.5rem;
      }
      button {
        padding: 0.6rem 1rem;
        border: none;
        background: #2d6cdf;
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover {
        opacity: 0.9;
      }
      #status {
        margin: 1rem 0;
        color: #444;
      }
      ul {
        padding-left: 1.2rem;
      }
      li {
        margin: 0.4rem 0;
      }
      a {
        color: #1a4db3;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <h1>네이버 뉴스(정치) 제목 스크래핑</h1>
    <button id="loadBtn">뉴스 불러오기</button>
    <p id="status">버튼을 눌러 최신 제목을 가져오세요.</p>
    <ul id="newsList"></ul>

    <script>
      const loadBtn = document.getElementById("loadBtn");
      const statusEl = document.getElementById("status");
      const newsListEl = document.getElementById("newsList");

      async function loadNews() {
        statusEl.textContent = "불러오는 중...";
        newsListEl.innerHTML = "";

        try {
          const response = await fetch("/api/news");
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || data.message || "알 수 없는 오류");
          }

          statusEl.textContent = `총 ${data.count}건 중 ${data.items.length}건 표시 (수집시각: ${new Date(data.fetchedAt).toLocaleString()})`;

          data.items.forEach((item) => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = item.link;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = item.title;
            li.appendChild(a);
            newsListEl.appendChild(li);
          });
        } catch (error) {
          statusEl.textContent = `오류: ${error.message}`;
        }
      }

      loadBtn.addEventListener("click", loadNews);
    </script>
  </body>
</html>
